<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Cloud</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: 50px auto; background: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        input { background: #333; color: #fff; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #app { display: none; }
        .hidden { display: none !important; }
        .media-container { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        img, video { width: 100%; border-radius: 8px; background: #000; }
    </style>
</head>
<body>

    <!-- Форма входа -->
    <div id="login-box" class="box">
        <h2>Доступ ограничен</h2>
        <input type="password" id="password-input" placeholder="Введите секретный пароль">
        <button onclick="checkPassword()">Войти</button>
        <p id="error-msg" style="color: red; display: none;">Неверный пароль!</p>
    </div>

    <!-- Основной интерфейс -->
    <div id="app" class="box">
        <h2>Моё Секретное Облако</h2>
        
        <!-- Кнопка загрузки -->
        <input type="file" id="file-uploader" accept="image/*,video/*">
        <button onclick="uploadFile()">Загрузить в интернет</button>
        <p id="upload-status"></p>

        <!-- Галерея -->
        <h3>Загруженные файлы</h3>
        <div class="media-container" id="gallery"></div>
    </div>

    <script>
        // НАСТРОЙКА SUPABASE (Твой URL я уже прописал сам)
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_KEY = "sb_publishable_CCejFdbTq0ye2ljTCeajDg_qFFpq4_X";
        const BUCKET_NAME = "my-media";
        
        // ТВОЙ ПАРОЛЬ ДЛЯ ВХОДА НА САЙТ
        const SECRET_PASSWORD = "vladik1234321s#V"; 

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === SECRET_PASSWORD) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('app').style.display = 'block';
                loadGallery();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('file-uploader');
            const status = document.getElementById('upload-status');
            if (!fileInput.files.length) return alert('Выберите файл!');

            const file = fileInput.files[0];
            status.innerText = "Загрузка...";

            // Создаем уникальное имя файла, чтобы они не перезаписывались
            const fileName = Date.now() + "_" + file.name;
            const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${BUCKET_NAME}/${encodeURIComponent(fileName)}`;

            try {
                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'apikey': SUPABASE_KEY,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (response.ok) {
                    status.innerText = "Успешно загружено!";
                    addMediaToGallery(fileName, file.type);
                    saveToLocalStorage(fileName, file.type);
                } else {
                    const errData = await response.json();
                    console.error(errData);
                    status.innerText = "Ошибка загрузки: " + (errData.message || response.statusText);
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Ошибка сети.";
            }
        }

        function addMediaToGallery(fileName, fileType) {
            const gallery = document.getElementById('gallery');
            const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET_NAME}/${encodeURIComponent(fileName)}`;
            
            let element = '';
            if (fileType.startsWith('image/')) {
                element = `<img src="${fileUrl}">`;
            } else if (fileType.startsWith('video/')) {
                element = `<video src="${fileUrl}" controls></video>`;
            }
            if (element) gallery.innerHTML = element + gallery.innerHTML;
        }

        function saveToLocalStorage(name, type) {
            let list = JSON.parse(localStorage.getItem('my_cloud_files')) || [];
            list.push({name, type});
            localStorage.setItem('my_cloud_files', JSON.stringify(list));
        }

        function loadGallery() {
            let list = JSON.parse(localStorage.getItem('my_cloud_files')) || [];
            list.forEach(file => addMediaToGallery(file.name, file.type));
        }
    </script>
</body>
</html>
